name: Publish prerelease package

on:
  push:
    branches:
      - kafka-assignment-diagnostics-v2.13.2
  workflow_dispatch:
    inputs:
      version_suffix:
        description: Optional prerelease version suffix without the base version prefix
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Confluent.Kafka prerelease package
    runs-on: ubuntu-latest

    env:
      PACKAGE_OUTPUT: artifacts/packages
      PACKAGE_TARGET_FRAMEWORKS: net8.0
      GITHUB_PACKAGES_SOURCE: https://nuget.pkg.github.com/dodopizza/index.json
      REQUESTED_VERSION_SUFFIX: ${{ github.event.inputs.version_suffix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          source-url: ${{ env.GITHUB_PACKAGES_SOURCE }}
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute prerelease version suffix
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 8)
          $branch = "${{ github.ref_name }}" -replace '[^0-9A-Za-z-]', '-'
          $suffix = $env:REQUESTED_VERSION_SUFFIX

          if ([string]::IsNullOrWhiteSpace($suffix)) {
            $suffix = "dodo.$branch.${{ github.run_number }}.$shortSha"
          }

          $suffix = $suffix.Trim() -replace '[^0-9A-Za-z.-]', '-'

          if ([string]::IsNullOrWhiteSpace($suffix)) {
            throw "Version suffix must not be empty."
          }

          "VERSION_SUFFIX=$suffix" >> $env:GITHUB_ENV
          "Package version suffix: $suffix"

      - name: Pack Confluent.Kafka
        run: >
          dotnet pack src/Confluent.Kafka/Confluent.Kafka.csproj
          --configuration Release
          /p:TargetFrameworks="${{ env.PACKAGE_TARGET_FRAMEWORKS }}"
          /p:VersionSuffix="${{ env.VERSION_SUFFIX }}"
          --output "${{ env.PACKAGE_OUTPUT }}"

      - name: Publish to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem "${{ env.PACKAGE_OUTPUT }}" -Filter *.nupkg |
            ForEach-Object {
              dotnet nuget push $_.FullName `
                --source "${{ env.GITHUB_PACKAGES_SOURCE }}" `
                --api-key "$env:GITHUB_TOKEN" `
                --skip-duplicate
            }
